# Default Kestrel model registry.
#
# Used only when no ./models.toml or per-user models.toml exists. Rates
# are placeholders pending provider-confirmed pricing -- do not treat
# them as authoritative for cost accounting.

[[models]]
id = "glm-5.2"
backend = "openrouter"
provider_model = "z-ai/glm-5.2"
api_key_env = "OPENROUTER_API_KEY"
context_window = 200000
max_output = 16384
usd_per_mtok_input = 0.60
usd_per_mtok_output = 2.20
usd_per_mtok_cached = 0.11
supports_tools = true
supports_cache = true
tags = ["planner", "executor"]

[[models]]
id = "glm-5.2-zai"
backend = "zai"
provider_model = "glm-5.2"
endpoint = "https://api.z.ai/api/paas/v4"
api_key_env = "ZAI_API_KEY"
context_window = 200000
max_output = 16384
usd_per_mtok_input = 0.60
usd_per_mtok_output = 2.20
usd_per_mtok_cached = 0.11
supports_tools = true
supports_cache = true
tags = ["planner", "executor"]

# A smaller, cheaper route for budget-triggered degradation to fall back
# to when spend crosses its soft cap. Without an entry like this one, a
# registry can still be loaded and used -- it just has nowhere to
# degrade to, and a soft cap alone never halts a task on its own.
[[models]]
id = "glm-5.2-air"
backend = "openrouter"
provider_model = "z-ai/glm-5.2-air"
api_key_env = "OPENROUTER_API_KEY"
context_window = 128000
max_output = 8192
usd_per_mtok_input = 0.10
usd_per_mtok_output = 0.40
usd_per_mtok_cached = 0.02
supports_tools = true
supports_cache = true
tags = ["cheap"]
