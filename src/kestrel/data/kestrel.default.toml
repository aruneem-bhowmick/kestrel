# Kestrel global configuration.
#
# This file documents every recognized key and its default value. Kestrel
# does not read this file directly -- copy the sections you need into your
# own kestrel.toml and edit from there.
#
# Configuration is resolved from exactly one file. Kestrel checks, in
# order, and stops at the first match:
#   1. the path given to --config
#   2. $KESTREL_CONFIG
#   3. ./kestrel.toml (current working directory)
#   4. <user config directory>/kestrel.toml
#   5. built-in defaults, if none of the above exist
#
# Secrets (API keys, tokens, passwords) must never appear in this file.
# Any key that looks like one is rejected at load time -- set it as an
# environment variable instead.

[general]
# Registry id used when no --model flag or /model command has selected
# another entry.
# default_model = "glm-5.2"

# Minimum severity of log records emitted to stderr. One of: "DEBUG",
# "INFO", "WARNING", "ERROR".
# log_level = "INFO"

[paths]
# Explicit override for the model registry file. Leave unset to use the
# registry loader's own default search.
# models_file = "/path/to/models.toml"

[managers.approval]
# Destructive-action kinds pre-approved for every request this session,
# skipping the interactive prompt entirely. One or more of: "delete",
# "force_push", "chmod", "network_on", "out_of_repo_write" (the latter
# two are recognized but have no live call path yet). Leave unset to
# require interactive approval for every destructive action.
# allowlist = ["delete"]

[managers.budget]
# USD caps on this task's own spend, on spend across the current UTC
# day, and on spend across the current UTC month. Leave any of them
# unset for "no cap" on that scope.
# session_usd = 5.00
# day_usd = 20.00
# month_usd = 100.00

# Fraction of a cap counted as the soft (warn/degrade) boundary, e.g.
# 0.8 means the soft threshold trips at 80% of whichever cap it
# belongs to.
# soft_threshold = 0.8

[managers.self_critique]
# Whether the self-critique phase makes a real, routed model call
# before acting on a proposed turn. Set to false to fall back to the
# agent loop's own always-approve default instead.
# enabled = true

[router.policy]
# Which registry tag each task class routes to. The first registry
# entry (sorted by id) carrying the named tag is used; a class with no
# matching entry falls back to the caller's own default model. Each
# value must be one of: "planner", "executor", "cheap", "local".
# plan = "planner"
# execute = "executor"
# critique = "cheap"
# trivial = "cheap"
# embed = "local"

[kb]
# Whether the knowledge base is active at all: retrieval before a task
# starts and writeback afterward both no-op when this is false.
# enabled = true

# How many notes a single search returns at most.
# top_k = 5

# When true, a written note is also stored in (and a search also reads
# from) a store shared across every repo, in addition to this repo's
# own. Leave false to keep the knowledge base strictly per-repo.
# global_namespace = false
