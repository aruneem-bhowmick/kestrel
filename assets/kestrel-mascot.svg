<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 26" width="256" height="208"
     shape-rendering="crispEdges" role="img"
     aria-label="Pixel-art kestrel perched on a branch, blinking and occasionally shaking">
  <style>
    .shake { }
    .blink { opacity: 0; }
    @media (prefers-reduced-motion: no-preference) {
      .shake { animation: shake 17s steps(1, end) infinite; }
      .blink { animation: blink 5s steps(1, end) infinite; }
    }
    @keyframes blink {
      0%        { opacity: 0; }
      96%, 100% { opacity: 1; }
    }
    @keyframes shake {
      0%         { transform: translateX(0); }
      94%        { transform: translateX(1px); }
      94.8%      { transform: translateX(-1px); }
      95.6%      { transform: translateX(1px); }
      96.4%      { transform: translateX(-1px); }
      97.2%, 100% { transform: translateX(0); }
    }
  </style>

  <!-- tail (behind branch, shakes with the bird) -->
  <g class="shake">
    <rect x="13" y="19" width="6" height="1" fill="#1f1b2e"/>
    <rect x="13" y="20" width="1" height="1" fill="#1f1b2e"/>
    <rect x="14" y="20" width="4" height="1" fill="#c8763d"/>
