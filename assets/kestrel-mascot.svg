    <rect x="14" y="22" width="4" height="1" fill="#26222f"/>
    <rect x="18" y="22" width="1" height="1" fill="#1f1b2e"/>
    <rect x="13" y="23" width="2" height="1" fill="#1f1b2e"/>
    <rect x="15" y="23" width="2" height="1" fill="#f0e2c4"/>
    <rect x="17" y="23" width="2" height="1" fill="#1f1b2e"/>
    <rect x="14" y="24" width="4" height="1" fill="#1f1b2e"/>
  </g>

  <!-- branch (static) -->
  <g>
    <rect x="26" y="14" width="4" height="1" fill="#1f1b2e"/>
    <rect x="26" y="15" width="1" height="1" fill="#1f1b2e"/>
    <rect x="27" y="15" width="2" height="1" fill="#57b34a"/>
    <rect x="29" y="15" width="1" height="1" fill="#1f1b2e"/>
    <rect x="0" y="16" width="32" height="1" fill="#1f1b2e"/>
    <rect x="0" y="17" width="1" height="1" fill="#1f1b2e"/>
    <rect x="1" y="17" width="30" height="1" fill="#7a4a2b"/>
